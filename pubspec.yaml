name: tafwela
description: تطبيق محطات البنزين في مصر - حالة الازدحام والخدمات
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.2.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.6
  shared_preferences: ^2.2.2
  geolocator: ^9.0.2
  url_launcher: ^6.3.0
  google_maps_flutter: ^2.5.0
  http: ^1.1.0
  firebase_core: ^3.8.1
  firebase_auth: ^5.3.1
  cloud_firestore: ^5.6.12

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^2.0.0
  flutterfire_cli: ^1.3.1

flutter:
  uses-material-design: true
  assets:
    - assets/images/
